name: Dev Builds

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      - "maintenance/**"

concurrency:
  group: dev-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Dev build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    env:
      VELUNE_REF_NAME: ${{ github.head_ref || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            rid: win-x64
          - label: linux-x64
            os: ubuntu-latest
            rid: linux-x64
          - label: macos-arm64
            os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-dev-builds-${{ hashFiles('**/*.csproj', 'Velune.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-dev-builds-
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Velune.slnx

      - name: Install native tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf tesseract-ocr tesseract-ocr-eng tesseract-ocr-fra

      - name: Install native tools (macOS)
        if: runner.os == 'macOS'
        run: brew install qpdf tesseract tesseract-lang

      - name: Install native tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install qpdf tesseract --yes --no-progress
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Resolve dev build version
        id: version
        shell: pwsh
        run: |
          $versionInfo = ./eng/Get-DevBuildVersion.ps1 -RefName "$env:VELUNE_REF_NAME" | ConvertFrom-Json
          "base_version=$($versionInfo.BaseVersion)" >> $env:GITHUB_OUTPUT
          "channel=$($versionInfo.Channel)" >> $env:GITHUB_OUTPUT
          "version=$($versionInfo.Version)" >> $env:GITHUB_OUTPUT
          "informational_version=$($versionInfo.InformationalVersion)" >> $env:GITHUB_OUTPUT
          "short_sha=$($versionInfo.ShortSha)" >> $env:GITHUB_OUTPUT
          "Resolved Velune dev build version: $($versionInfo.InformationalVersion)"

      - name: Collect bundled native tools
        shell: pwsh
        run: |
          $nativeToolsInfo = ./eng/Collect-DevNativeTools.ps1 -RuntimeIdentifier "${{ matrix.rid }}" | ConvertFrom-Json
          "Bundled native tools: $($nativeToolsInfo.ToolsRoot)"

      - name: Build package
        id: package
        shell: pwsh
        run: |
          $packageInfo = ./eng/New-DevBuildPackage.ps1 `
            -RuntimeIdentifier "${{ matrix.rid }}" `
            -Version "${{ steps.version.outputs.version }}" `
            -InformationalVersion "${{ steps.version.outputs.informational_version }}" | ConvertFrom-Json

          "package_path=$($packageInfo.PackagePath)" >> $env:GITHUB_OUTPUT
          "checksum_path=$($packageInfo.ChecksumPath)" >> $env:GITHUB_OUTPUT
          "Built package: $($packageInfo.PackagePath)"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: velune-dev-${{ matrix.label }}-${{ steps.version.outputs.version }}
          if-no-files-found: error
          path: |
            ${{ steps.package.outputs.package_path }}
            ${{ steps.package.outputs.checksum_path }}
